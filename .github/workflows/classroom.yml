name: Autograding Tests
'on':
- push
- repository_dispatch
permissions:
  checks: write
  actions: read
  contents: read
jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Character Test Case
      id: character-test-case
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: Character Test Case
        setup-command: ''
        command: javac -cp "lib/junit-platform-console-standalone.jar:bin" src/tests/CharacterTest.java
          -d bin && java -jar lib/junit-platform-console-standalone.jar --class-path
          bin --select-class tests.CharacterTest
        timeout: 10
        max-score: 30
    - name: Archer Test Case
      id: archer-test-case
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: Archer Test Case
        setup-command: ''
        command: javac -cp "lib/junit-platform-console-standalone.jar:bin" src/tests/ArcherTest.java
          -d bin && java -jar lib/junit-platform-console-standalone.jar --class-path
          bin --select-class tests.ArcherTest
        timeout: 10
        max-score: 13
    - name: Warrior Test Case
      id: warrior-test-case
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: Warrior Test Case
        setup-command: ''
        command: javac -cp "lib/junit-platform-console-standalone.jar:bin" src/tests/WarriorTest.java
          -d bin && java -jar lib/junit-platform-console-standalone.jar --class-path
          bin --select-class tests.WarriorTest
        timeout: 10
        max-score: 13
    - name: Wizard Test Case
      id: wizard-test-case
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: Wizard Test Case
        setup-command: ''
        command: javac -cp "lib/junit-platform-console-standalone.jar:bin" src/tests/WizardTest.java
          -d bin && java -jar lib/junit-platform-console-standalone.jar --class-path
          bin --select-class tests.WizardTest
        timeout: 10
        max-score: 13
    - name: Inheritance Test Case
      id: inheritance-test-case
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: Inheritance Test Case
        setup-command: ''
        command: javac -cp "lib/junit-platform-console-standalone.jar:bin" src/tests/InheritanceTest.java
          -d bin && java -jar lib/junit-platform-console-standalone.jar --class-path
          bin --select-class tests.InheritanceTest
        timeout: 10
        max-score: 20
    - name: Main Test Case
      id: main-test-case
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: Main Test Case
        setup-command: ''
        command: javac -cp "lib/junit-platform-console-standalone.jar:bin" src/tests/MainTest.java
          -d bin && java -jar lib/junit-platform-console-standalone.jar --class-path
          bin --select-class tests.MainTest
        timeout: 10
        max-score: 10
    - name: Autograding Reporter
      uses: classroom-resources/autograding-grading-reporter@v1
      env:
        CHARACTER-TEST-CASE_RESULTS: "${{steps.character-test-case.outputs.result}}"
        ARCHER-TEST-CASE_RESULTS: "${{steps.archer-test-case.outputs.result}}"
        WARRIOR-TEST-CASE_RESULTS: "${{steps.warrior-test-case.outputs.result}}"
        WIZARD-TEST-CASE_RESULTS: "${{steps.wizard-test-case.outputs.result}}"
        INHERITANCE-TEST-CASE_RESULTS: "${{steps.inheritance-test-case.outputs.result}}"
        MAIN-TEST-CASE_RESULTS: "${{steps.main-test-case.outputs.result}}"
      with:
        runners: character-test-case,archer-test-case,warrior-test-case,wizard-test-case,inheritance-test-case,main-test-case
